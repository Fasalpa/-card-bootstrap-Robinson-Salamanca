<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>My Card</title>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow" style="width: 20rem">
      <img src="/assets/sho.png" class="card-img-top" alt="Foto de perfil" />

      <div class="card-body text-center">
        <h5 class="card-title text-primary">Robinson Fabian Salamanca Palacio</h5>
        <h6 class="card-subtitle">Software Developer</h6>

        <p class="card-text mt-3">
          Full Stack en crecimiento, amante del aprendizaje continuo y de
          construir experiencias web útiles, claras y funcionales.
        </p>

        <div class="d-grid gap-2">
          <a
            id="btnGithub"
            href="https://github.com/Fasalpa"
            target="_blank"
            class="btn btn-outline-primary"
            >GitHub</a
          >
          <a
            id="btnContacto"
            href="https://www.linkedin.com/in/robinson-fabian-salamanca-palacio-desarrollador-full-stack/"
            target="_blank"
            class="btn btn-primary"
            >Contacto</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
